<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luciole Quest — Email confirmed</title>
  <link rel="icon" href="assets/mascot.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lang-toggle">
    <button id="lang-fr" type="button">FR</button>
    <button id="lang-en" type="button">EN</button>
  </div>

  <main class="container">
    <div class="success-state">
      <img src="assets/mascot.png" alt="Lux" class="mascot">
      <h1 data-i18n="title">Email confirmé !</h1>
      <p class="hint" data-i18n="hint">
        Votre compte est activé. Ouvrez l'application Luciole Quest pour vous connecter.
      </p>
    </div>
  </main>

  <script>
    const I18N = {
      fr: {
        title: 'Email confirmé !',
        hint: "Votre compte est activé. Ouvrez l'application Luciole Quest pour vous connecter.",
      },
      en: {
        title: 'Email confirmed!',
        hint: 'Your account is activated. Open the Luciole Quest app to log in.',
      },
    };

    function applyLang(lang) {
      const dict = I18N[lang] || I18N.en;
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (dict[key]) el.textContent = dict[key];
      });
      document.getElementById('lang-fr').classList.toggle('active', lang === 'fr');
      document.getElementById('lang-en').classList.toggle('active', lang === 'en');
      try { localStorage.setItem('lq-lang', lang); } catch { /* ignore */ }
    }

    const stored = (() => { try { return localStorage.getItem('lq-lang'); } catch { return null; } })();
    const browser = (navigator.language || 'en').slice(0, 2).toLowerCase();
    const initial = stored || (browser === 'fr' ? 'fr' : 'en');
    applyLang(initial);

    document.getElementById('lang-fr').addEventListener('click', () => applyLang('fr'));
    document.getElementById('lang-en').addEventListener('click', () => applyLang('en'));
  </script>
</body>
</html>
